<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=320, user-scalable=no">
<title>シンプルお絵かき</title>
<style>
  body { margin: 10px; font-family: sans-serif; }
  #controls { margin-bottom: 10px; }
  canvas { border: 1px solid #000; display: block; }
</style>
</head>
<body onload="init()">

<div id="controls">
  <input type="color" id="penColor" value="#22c55e">
  <input type="range" id="penSize" min="1" max="20" value="4">
  <button id="eraserBtn">消しゴム</button>
  <button id="clearBtn">消す</button>
</div>

<canvas id="canvas" width="300" height="400"></canvas>

<script src="drawing.js" type="text/javascript"></script>
</body>
</html>
