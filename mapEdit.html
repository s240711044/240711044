<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>マップエディタ</title>
        <style>
    body {
        background-color: #2c3e50; 
        display: flex;
        flex-direction: column;
        align-items: center;    /* 横方向の真ん中寄せ */
        justify-content: center; /* 縦方向の真ん中寄せ */
        min-height: 100vh;       
        margin: 0;
        font-family: sans-serif;
        color: white;
    }

    table {
        border-collapse: collapse;
        border: 4px solid #1a252f; 
        box-shadow: 0 0 20px rgba(0,0,0,0.5); /* 影をつけてる */
    }

    td {
        padding: 0;
        line-height: 0;
    }

    .tile {
        width: 50px;  
        height: 50px;
        display: block;
        cursor: pointer;
        transition: 0.2s; /* 変化をおそくなめらに動くようにした */
    }

    .tile:hover {
        filter: brightness(1.3); /* 少し明るく */
        transform: scale(1.05);  /* 少し大きく */
        z-index: 10;
        position: relative;
    }

    #info {
        margin-top: 20px;
        background: rgba(0,0,0,0.3);
        padding: 10px 20px;
        border-radius: 5px;
    }
</style>
        <script src="mapEdit.js" type="text/javascript"></script>
    </head>
    <body onload="init()">
        <table id="board"></table>
        <h2 id="info"></h2>
    </body>
</html>
