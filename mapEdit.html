<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>マップエディタ</title>
        <style>
            /* スキマを無くす */
            table {
                border-collapse: collapse; /* 境界線を重ねる */
            }
            td {
                padding: 0;                /* 余白をゼロにする */
                line-height: 0;           /* 隙間を消す */
            }
            .tile {
                width: 40px;               
                height: 40px;
                display: block;         
                cursor: pointer;          /* マウスを乗せた時にマークを表示 */
            }
        </style>
        <script src="mapEdit.js" type="text/javascript"></script>
    </head>
    <body onload="init()">
        <table id="board"></table>
        <h2 id="info"></h2>
    </body>
</html>
